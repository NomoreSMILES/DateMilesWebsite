<body>
    <div class="flexForm">
    
    
    <div class="BgPics">
    <div class="formContainer">
        <h2 class="Contact">Date Miles Application</h2>
        <form>

            <div class="formGroup">
                <label for="FullName">Full Name</label>
                <input name="Fullname" type="text" id="FullName" placeholder="Enter Your name">
            </div>


            <div class="formGroup">
                <label for="email">Phone Number</label>
                <input name="Email" type="text" id="email" placeholder="Enter your Number">

            </div>

            <div class="formGroup">
                <label for="topic">How would you rate Miles on a scale of 1-10</label>
                <select name="Topic" id="topic">
                    <option value="">Select A Rating</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                </select>
                 </div>
                <fieldset>
                    <legend>How did you find this website?</legend>
                    <div class="radioGroup">
                        <label><input type="radio" name="Contact" value="FromFriend">From a Friend</label>
                        <label><input type="radio" name="Contact" value="FromTheGoat">From Miles Himself</label>
                        <label><input type="radio" name="Contact" value="FromSocialMedia">From Social Media</label>
                        <label><input type="radio" name="Contact" value="FromOther">Other</label>
                    </div>
                </fieldset>
                <fieldset>
                    <legend>Fav Movie Miles is in</legend>
                    <div class="CheckBox">
                        <label><input type="checkbox" name="interests" value="Sigma">I am Sigma</label>
                        <label><input type="checkbox" name="interests" value="Aura">Aura</label>
                        <label><input type="checkbox" name="interests" value="Law">Above The law</label>
                        <label><input type="checkbox" name="interests" value="FastAndDelicious">Fast And Delicious</label>
                    </div>
                </fieldset>
                

           
            <div class="formGroup">
                    <label for="message">Message For Miles</label>
                    <textarea name="message" id="message" placeholder="Type Message..." rows="4"></textarea>
                </div>
                <button name="Submit">Submit</button>
        </form>
    </div>
